name: CI

# Corre typecheck + tests en cada push y PR. Este es el "loop de tests"
# del proyecto, ya que no hay Node local (ver CLAUDE.md).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build
